name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      identity_ref:
        description: >-
          sufficit-identity git ref (commit SHA, branch, or tag) to check
          out for the core dependency. Leave empty to use the pinned default
          (env.IDENTITY_REF below).
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Sibling identity repo pin — sufficit-identity/src/core is referenced
      # via relative ProjectReference (../../../sufficit-identity/src/core/).
      # This SHA is sufficit-identity's HEAD on main as of 2026-07-22.
      # Do not repoint at a moving branch — pinning ensures reproducible builds.
      IDENTITY_REF: 91fc80177281acf85c0533883975923705972f5f

    steps:
      - name: Checkout sufficit-identity-ui
        uses: actions/checkout@v5
        with:
          path: sufficit-identity-ui

      # sufficit-identity-ui references sufficit-identity/src/core via a
      # relative ProjectReference. Checkout identity as a sibling so the
      # path resolves, pinned to a concrete commit (see IDENTITY_REF above).
      - name: Checkout sufficit-identity (core dependency)
        uses: actions/checkout@v5
        with:
          repository: sufficit/sufficit-identity
          ref: ${{ github.event.inputs.identity_ref || env.IDENTITY_REF }}
          path: sufficit-identity

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        working-directory: sufficit-identity-ui
        run: dotnet restore Sufficit.Identity.UI.sln

      # Treat warnings as errors — same policy as sufficit-identity CI.
      # The UI had a CS8601 nullable warning in ResetPassword.razor that was
      # silently hidden before; -warnaserror here prevents regressions.
      - name: Build (warnings treated as errors)
        working-directory: sufficit-identity-ui
        run: dotnet build Sufficit.Identity.UI.sln --configuration Release --no-restore -warnaserror

      # No test project exists in the UI repo today — the E2E test suite
      # lives in sufficit-identity/src/tests and exercises the UI indirectly
      # via the STS host. When the UI gets its own unit/component tests,
      # add a `dotnet test` step here.

      - name: Dependency vulnerability audit
        working-directory: sufficit-identity-ui
        run: dotnet list package --vulnerable --include-transitive

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sufficit-identity-ui
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.30.1
          curl -sSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks (fails on any finding)
        # Uses default gitleaks ruleset (the custom .gitleaks.toml with
        # Sufficit-specific patterns lives in sufficit-identity, not here).
        run: gitleaks detect --source . --redact --verbose --exit-code 1
